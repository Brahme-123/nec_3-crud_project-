<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Edit User</h1>

    <form action="/update/{{ user[0] }}" method="POST">

        <input type="text"
               name="name"
               value="{{ user[1] }}"
               required>

        <button type="submit">
            Update
        </button>

    </form>

</div>

</body>
</html>
